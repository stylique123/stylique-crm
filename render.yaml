services:
  - type: web
    name: stylique-crm
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node server/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: STYLIQUE_STATIC_DIR
        value: ./dist
      - key: STYLIQUE_DATA_DIR
        value: /tmp/stylique-crm-data
      - key: VITE_REQUIRE_BACKEND_AUTH
        value: true
