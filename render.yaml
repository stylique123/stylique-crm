services:
  - type: web
    name: stylique-crm
    env: node
    plan: free
    buildCommand: unzip -o stylique-crm-deploy-ready.zip && npm ci && npm run build
    startCommand: node server/index.mjs
    healthCheckPath: /health
    disk:
      name: stylique-crm-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: STYLIQUE_STATIC_DIR
        value: ./dist
      - key: STYLIQUE_DATA_DIR
        value: /var/data
      - key: VITE_REQUIRE_BACKEND_AUTH
        value: true

